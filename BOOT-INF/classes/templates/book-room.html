<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Room - Hotel Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.5) 0%, rgba(118, 75, 162, 0.5) 100%), url('/images/hotel.jpg') center/cover no-repeat fixed;
            min-height: 100vh;
            color: #2c3e50;
        }
        nav { background: linear-gradient(135deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.9) 100%); padding: 1.2rem 0; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 2rem; }
        .logo { font-size: 1.8em; font-weight: 700; color: #667eea; text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .nav-links { display: flex; gap: 2rem; list-style: none; }
        .nav-links a { color: white; text-decoration: none; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover { color: #667eea; }
        .user-menu { display: flex; align-items: center; gap: 15px; }
        .user-info { color: white; text-align: right; }
        .user-name { font-weight: 700; font-size: 0.95em; }
        .user-role { font-size: 0.8em; color: #aaa; }
        .btn-logout { background: #e74c3c; color: white; padding: 8px 15px; border: none; border-radius: 5px; text-decoration: none; font-size: 0.9em; cursor: pointer; transition: all 0.3s; }
        .btn-logout:hover { background: #c0392b; }
        .container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; }
        .page-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px; border-radius: 15px; margin-bottom: 40px; box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3); }
        .page-header h1 { font-size: 2.5em; margin-bottom: 10px; font-weight: 700; }

        .search-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .search-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            align-items: end;
        }

        .form-group label {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 8px;
            display: block;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-search {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-search:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .rooms-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; }

        .room-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.3s;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .room-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(102, 126, 234, 0.25);
        }

        .room-image {
            height: 250px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4em;
        }

        .room-content {
            padding: 25px;
        }

        .room-type {
            font-size: 1.4em;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 10px;
        }

        .room-number {
            color: #999;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .room-card:hover .room-number {
            color: #667eea;
            font-weight: 600;
        }

        .room-features {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .room-feature {
            background: #f5f7ff;
            padding: 6px 12px;
            border-radius: 5px;
            font-size: 0.85em;
            color: #667eea;
            font-weight: 500;
        }

        .room-footer {
            border-top: 1px solid #e0e0e0;
            padding-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .room-price {
            font-size: 1.8em;
            font-weight: 700;
            color: #667eea;
        }

        .btn-book {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-book:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-back {
            background: #95a5a6;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 30px;
            transition: all 0.3s;
        }

        .btn-back:hover {
            background: #7f8c8d;
        }

        .no-rooms {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 15px;
            color: #999;
        }

        @media (max-width: 768px) {
            .search-form { grid-template-columns: 1fr; }
            .rooms-grid { grid-template-columns: 1fr; }
            .page-header h1 { font-size: 1.8em; }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <a href="#" class="logo"><span>🏨</span> Hotel Management</a>
            <ul class="nav-links">
                <li><a href="/guest-dashboard">My Dashboard</a></li>
                <li><a href="/home">Home</a></li>
            </ul>
            <div class="user-menu">
                <div class="user-info">
                    <div class="user-name" th:text="${session.userName}">Guest Name</div>
                    <div class="user-role">👤 Guest</div>
                </div>
                <a href="/auth/logout" class="btn-logout">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <a href="/guest-dashboard" class="btn-back">← Back to Dashboard</a>

        <!-- Page Header -->
        <div class="page-header">
            <h1>🛏️ Book a Room</h1>
            <p>Find and book your perfect hotel room</p>
        </div>

        <!-- Search Section -->
        <div class="search-section">
            <h3 style="margin-bottom: 20px; color: #2c3e50;">Filter by Dates (Optional)</h3>
            <form id="searchForm" class="search-form">
                <div class="form-group">
                    <label for="checkIn">Check-In Date</label>
                    <input type="date" id="checkIn" name="checkIn">
                </div>
                <div class="form-group">
                    <label for="checkOut">Check-Out Date</label>
                    <input type="date" id="checkOut" name="checkOut">
                </div>
                <div class="form-group">
                    <button type="button" class="btn-search" onclick="searchRooms()">Filter by Dates</button>
                    <button type="button" class="btn-search" style="background: #95a5a6; margin-left: 10px;" onclick="loadAllRooms()">Show All Rooms</button>
                </div>
            </form>
        </div>

        <!-- Available Rooms -->
        <div id="roomsContainer">
            <div class="no-rooms">
                <p>Loading rooms...</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = 'http://localhost:8080/api';
        let allRooms = [];

        // Set minimum date to today
        document.getElementById('checkIn').min = new Date().toISOString().split('T')[0];
        document.getElementById('checkOut').min = new Date().toISOString().split('T')[0];

        // Update checkout date min when checkin changes
        document.getElementById('checkIn').addEventListener('change', function() {
            document.getElementById('checkOut').min = this.value;
        });

        async function loadAllRooms() {
            try {
                const response = await fetch(`${API_BASE}/rooms`);
                let data;

                if (!response.ok) {
                    throw new Error('Failed to load rooms');
                }

                const contentType = response.headers.get('content-type');
                if (!contentType || !contentType.includes('application/json')) {
                    throw new Error('Invalid response type');
                }

                data = await response.json();

                if (data.success && data.data) {
                    allRooms = data.data;
                    displayRooms(allRooms, null, null);
                } else if (Array.isArray(data)) {
                    allRooms = data;
                    displayRooms(allRooms, null, null);
                } else {
                    showNoRooms('No rooms available');
                }
            } catch (error) {
                console.error('Error loading rooms:', error);
                showNoRooms('Error loading rooms. Please try again.');
            }
        }

        async function searchRooms() {
            const checkIn = document.getElementById('checkIn').value;
            const checkOut = document.getElementById('checkOut').value;

            if (!checkIn || !checkOut) {
                alert('Please select both check-in and check-out dates to filter');
                return;
            }

            if (checkIn >= checkOut) {
                alert('Check-out date must be after check-in date');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/rooms/available-between?checkIn=${checkIn}&checkOut=${checkOut}`);
                const data = await response.json();

                if (data.success && data.data) {
                    displayRooms(data.data, checkIn, checkOut);
                } else {
                    showNoRooms('No rooms available for the selected dates');
                }
            } catch (error) {
                console.error('Error searching rooms:', error);
                showNoRooms('Error searching rooms. Please try again.');
            }
        }

        function displayRooms(rooms, checkIn, checkOut) {
            if (rooms.length === 0) {
                showNoRooms('No rooms available');
                return;
            }

            const container = document.getElementById('roomsContainer');
            container.innerHTML = '';

            // Sort rooms by room number for better organization
            const sortedRooms = rooms.sort((a, b) => {
                const numA = parseInt(a.roomNumber) || 0;
                const numB = parseInt(b.roomNumber) || 0;
                return numA - numB;
            });

            sortedRooms.forEach(room => {
                const roomCard = document.createElement('div');
                roomCard.className = 'room-card';

                let pricingHTML = '';

                // Calculate pricing if dates are provided
                if (checkIn && checkOut) {
                    const checkInDate = new Date(checkIn);
                    const checkOutDate = new Date(checkOut);
                    const nights = Math.ceil((checkOutDate - checkInDate) / (1000 * 60 * 60 * 24));
                    const totalPrice = (parseFloat(room.pricePerNight || 100) * nights).toFixed(2);
                    pricingHTML = `
                        <div style="color: #666; font-size: 0.85em; margin: 12px 0;">
                            <strong>Pricing:</strong> $${room.pricePerNight || 100}/night × ${nights} nights = <strong style="color: #667eea; font-size: 1.1em;">$${totalPrice}</strong>
                        </div>
                    `;
                } else {
                    pricingHTML = `
                        <div style="color: #666; font-size: 0.85em; margin: 12px 0;">
                            <strong>Select dates for pricing calculation</strong>
                        </div>
                    `;
                }

                roomCard.innerHTML = `
                    <div class="room-image">🛏️</div>
                    <div class="room-content">
                        <div class="room-number" style="font-size: 1.2em; font-weight: 700; color: #667eea; margin-bottom: 8px;">Room #${room.roomNumber}</div>
                        <div class="room-type">${room.roomType || 'Standard Room'}</div>
                        <div style="color: #999; font-size: 0.85em; margin-bottom: 12px;">Floor ${room.floor || 1} | ${room.bedType || 'Standard'} Bed</div>
                        <div class="room-features">
                            <span class="room-feature">👥 ${room.capacity || 2} Guests</span>
                            <span class="room-feature">🛏️ ${room.bedType || 'Standard'}</span>
                            ${room.amenities ? `<span class="room-feature">✨ ${room.amenities.substring(0, 20)}...</span>` : ''}
                        </div>
                        ${pricingHTML}
                        <div class="room-footer">
                            <div class="room-price">$${room.pricePerNight || room.price || '100'}/night</div>
                            <a onclick="initiateBooking(${room.id}, '${room.roomNumber}')" style="cursor: pointer; text-decoration: none;" class="btn-book">Book Now →</a>
                        </div>
                    </div>
                `;
                container.appendChild(roomCard);
            });
        }

        function initiateBooking(roomId, roomNumber) {
            const checkIn = document.getElementById('checkIn').value;
            const checkOut = document.getElementById('checkOut').value;

            if (!checkIn || !checkOut) {
                alert('Please select check-in and check-out dates before booking');
                return;
            }

            if (checkIn >= checkOut) {
                alert('Check-out date must be after check-in date');
                return;
            }

            // Store booking data in session storage for the bookings page
            sessionStorage.setItem('bookingData', JSON.stringify({
                roomId: roomId,
                roomNumber: roomNumber,
                checkIn: checkIn,
                checkOut: checkOut
            }));
            // Navigate to bookings page
            window.location.href = `/bookings?roomId=${roomId}&checkIn=${checkIn}&checkOut=${checkOut}`;
        }

        function showNoRooms(message) {
            const container = document.getElementById('roomsContainer');
            container.innerHTML = `<div class="no-rooms"><p>${message}</p></div>`;
        }

        // Load all rooms when page loads
        window.addEventListener('load', function() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('checkIn').value = today;
            document.getElementById('checkOut').value = today;
            loadAllRooms();
        });
    </script>
</body>
</html>
