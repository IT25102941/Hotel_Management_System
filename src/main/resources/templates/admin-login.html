<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Hotel Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Roboto', sans-serif;
        }
        .login-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            padding: 50px 40px;
            animation: slideIn 0.5s ease;
            border-top: 4px solid #e74c3c;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .login-header h1 {
            font-size: 2.5em;
            color: #e74c3c;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .login-header p {
            color: #999;
            font-size: 0.95em;
        }
        .admin-badge {
            display: inline-block;
            background: #e74c3c;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 700;
            margin-bottom: 15px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
            font-size: 0.95em;
        }
        .form-control {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 0.95em;
            transition: all 0.3s;
        }
        .form-control:focus {
            outline: none;
            border-color: #e74c3c;
            box-shadow: 0 0 0 4px rgba(231, 76, 60, 0.1);
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(231, 76, 60, 0.4);
        }
        .alert {
            border-radius: 10px;
            margin-bottom: 20px;
            border: none;
        }
        .links-group {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            font-size: 0.9em;
        }
        .links-group a {
            color: #e74c3c;
            text-decoration: none;
            transition: color 0.3s;
        }
        .links-group a:hover {
            color: #c0392b;
        }
        .divider {
            text-align: center;
            margin: 30px 0;
            color: #999;
        }
        .guest-link {
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }
        .guest-link p {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
        }
        .guest-link a {
            display: inline-block;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .guest-link a:hover {
            color: #764ba2;
        }
        .security-notice {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 0.85em;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="admin-badge">👨‍💼 ADMIN PORTAL</div>
            <h1>🏨</h1>
            <h1>Hotel Management</h1>
            <p>Administrator Login</p>
        </div>

        <div class="security-notice">
            ⚠️ <strong>Security Notice:</strong> This is a restricted admin area. Unauthorized access is prohibited.
        </div>

        <div id="errorAlert" style="display: none;" class="alert alert-danger">
            <strong>⚠️ Error:</strong> <span id="errorMessage"></span>
        </div>

        <form method="POST" action="/auth/admin-login" id="loginForm">
            <div class="form-group">
                <label for="email">Admin Email</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="admin@hotel.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="Enter admin password" required>
            </div>

            <div class="form-check" style="margin-bottom: 20px;">
                <input class="form-check-input" type="checkbox" id="remember" name="remember">
                <label class="form-check-label" for="remember">
                    Remember me on this device
                </label>
            </div>

            <button type="submit" class="btn-login">Admin Login</button>
        </form>

        <div class="divider">OR</div>

        <div class="guest-link">
            <p>Are you a guest?</p>
            <a href="/auth/login">👤 Guest Login Here</a>
        </div>

        <div class="links-group" style="margin-top: 30px; justify-content: center;">
            <a href="/home">← Back to Home</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Get error from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');
        if (error) {
            document.getElementById('errorMessage').textContent = decodeURIComponent(error);
            document.getElementById('errorAlert').style.display = 'block';
        }

        // Form validation
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!email) {
                e.preventDefault();
                document.getElementById('errorMessage').textContent = 'Email is required';
                document.getElementById('errorAlert').style.display = 'block';
                return false;
            }
            if (!password) {
                e.preventDefault();
                document.getElementById('errorMessage').textContent = 'Password is required';
                document.getElementById('errorAlert').style.display = 'block';
                return false;
            }
        });
    </script>
</html>
