<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Invoices - Hotel Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.5) 0%, rgba(118, 75, 162, 0.5) 100%), url('/images/hotel.jpg') center/cover no-repeat fixed;
            min-height: 100vh;
            color: #2c3e50;
        }
        nav { background: linear-gradient(135deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.9) 100%); padding: 1.2rem 0; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 2rem; }
        .logo { font-size: 1.8em; font-weight: 700; color: #667eea; text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .nav-links { display: flex; gap: 2rem; list-style: none; }
        .nav-links a { color: white; text-decoration: none; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover { color: #667eea; }
        .user-menu { display: flex; align-items: center; gap: 15px; }
        .user-info { color: white; text-align: right; }
        .user-name { font-weight: 700; font-size: 0.95em; }
        .user-role { font-size: 0.8em; color: #aaa; }
        .btn-logout { background: #e74c3c; color: white; padding: 8px 15px; border: none; border-radius: 5px; text-decoration: none; font-size: 0.9em; cursor: pointer; transition: all 0.3s; }
        .btn-logout:hover { background: #c0392b; }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .page-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px; border-radius: 15px; margin-bottom: 40px; box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3); }
        .page-header h1 { font-size: 2.5em; margin-bottom: 10px; font-weight: 700; }
        .btn-back { background: #95a5a6; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; text-decoration: none; display: inline-block; margin-bottom: 30px; transition: all 0.3s; }
        .btn-back:hover { background: #7f8c8d; }
        .invoice-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            border-left: 5px solid #667eea;
            transition: all 0.3s;
        }
        .invoice-card:hover {
            transform: translateX(5px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.2);
        }
        .invoice-header {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e0e0e0;
        }
        .invoice-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .invoice-number {
            font-size: 1.1em;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
        }
        .invoice-date {
            font-size: 0.9em;
            color: #999;
        }
        .invoice-amount {
            text-align: right;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-end;
        }
        .amount-label {
            font-size: 0.85em;
            color: #999;
            margin-bottom: 3px;
        }
        .amount-value {
            font-size: 1.8em;
            font-weight: 700;
            color: #28a745;
        }
        .invoice-status {
            text-align: right;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-end;
        }
        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9em;
            margin-bottom: 5px;
        }
        .status-paid {
            background: #d4edda;
            color: #155724;
        }
        .status-pending {
            background: #fff3cd;
            color: #856404;
        }
        .status-unpaid {
            background: #f8d7da;
            color: #721c24;
        }
        .status-overdue {
            background: #f8d7da;
            color: #721c24;
        }
        .due-date {
            font-size: 0.85em;
            color: #999;
        }
        .invoice-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .btn-view, .btn-print {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
            display: inline-block;
        }
        .btn-view {
            background: #667eea;
            color: white;
        }
        .btn-view:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }
        .btn-print {
            background: #28a745;
            color: white;
        }
        .btn-print:hover {
            background: #218838;
            transform: translateY(-2px);
        }
        .no-invoices {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .no-invoices-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }
        .no-invoices p {
            color: #999;
            font-size: 1.1em;
            margin-bottom: 20px;
        }
        .filter-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        .filter-section select {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95em;
            background: white;
        }
        .filter-section select:focus {
            outline: none;
            border-color: #667eea;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        .stat-icon {
            font-size: 2em;
            margin-bottom: 10px;
        }
        .stat-value {
            font-size: 1.8em;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
        }
        .stat-label {
            font-size: 0.9em;
            color: #999;
        }
        @media (max-width: 768px) {
            .page-header h1 { font-size: 1.8em; }
            .invoice-header { grid-template-columns: 1fr; gap: 15px; }
            .invoice-amount, .invoice-status { text-align: left; }
            .invoice-footer { flex-direction: column; }
            .btn-view, .btn-print { width: 100%; }
            .filter-section { flex-direction: column; }
            .stats { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <a href="#" class="logo"><span>🏨</span> Hotel Management</a>
            <ul class="nav-links">
                <li><a href="/guest-dashboard">My Dashboard</a></li>
                <li><a href="/home">Home</a></li>
            </ul>
            <div class="user-menu">
                <div class="user-info">
                    <div class="user-name" th:text="${session.userName}">Guest Name</div>
                    <div class="user-role">👤 Guest</div>
                </div>
                <a href="/auth/logout" class="btn-logout">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Hidden element to store user email for JS -->
        <div class="d-none" th:attr="data-user-email=${userEmail}"></div>
        <a href="/guest-dashboard" class="btn-back">← Back to Dashboard</a>

        <!-- Page Header -->
        <div class="page-header">
            <h1>💳 My Invoices</h1>
            <p>View and manage your billing invoices</p>
        </div>

        <!-- Statistics -->
        <div class="stats" id="statsContainer" style="display: none;">
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-value" id="totalInvoices">0</div>
                <div class="stat-label">Total Invoices</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-value" id="paidInvoices">0</div>
                <div class="stat-label">Paid</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⏳</div>
                <div class="stat-value" id="pendingInvoices">0</div>
                <div class="stat-label">Pending</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💰</div>
                <div class="stat-value" id="totalAmount">$0</div>
                <div class="stat-label">Total Amount</div>
            </div>
        </div>

        <!-- Filter Section -->
        <div class="filter-section">
            <label for="guestFilter" style="margin: 0; font-weight: 600;">Guest:</label>
            <select id="guestFilter" onchange="loadInvoices()">
                <option value="">Select guest</option>
            </select>
            <label for="statusFilter" style="margin: 0; font-weight: 600;">Filter by Status:</label>
            <select id="statusFilter" onchange="filterInvoices()">
                <option value="">All Invoices</option>
                <option value="Paid">Paid</option>
                <option value="Unpaid">Unpaid</option>
                <option value="Pending">Pending</option>
                <option value="Overdue">Overdue</option>
            </select>
        </div>

        <!-- Invoices List -->
        <div id="invoicesContainer">
            <div class="no-invoices">
                <div class="no-invoices-icon">💳</div>
                <p>No invoices yet</p>
                <p style="font-size: 0.95em; margin-bottom: 0;">Book a room to generate your first invoice</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = `${window.location.origin}/api`;
        let allInvoices = [];

        function getUserEmail() {
            const raw = document.querySelector('[data-user-email]')?.getAttribute('data-user-email') || '';
            if (!raw || raw.includes('[[') || raw.includes(']]')) {
                return '';
            }
            return raw;
        }

        function setEmptyState(message, hint) {
            const hintHtml = hint ? `<p style="font-size: 0.9em; margin-bottom: 0; color: #999;">${hint}</p>` : '';
            document.getElementById('invoicesContainer').innerHTML = `
                <div class="no-invoices">
                    <div class="no-invoices-icon">💳</div>
                    <p>${message}</p>
                    ${hintHtml}
                </div>
            `;
        }

        async function loadGuestsForFilter() {
            try {
                const response = await fetch(`${API_BASE}/guests`);
                if (!response.ok) {
                    return;
                }
                const guests = await response.json();
                const select = document.getElementById('guestFilter');
                select.innerHTML = '<option value="">Select guest</option>';
                guests.forEach(guest => {
                    const option = document.createElement('option');
                    option.value = guest.id;
                    option.textContent = `${guest.firstName} ${guest.lastName}`;
                    select.appendChild(option);
                });
            } catch (error) {
                console.warn('Unable to load guests:', error);
            }
        }

        async function loadInvoices() {
            try {
                let guestId = document.getElementById('guestFilter').value;
                const userEmail = getUserEmail();

                if (!guestId && userEmail) {
                    const guestResponse = await fetch(`${API_BASE}/guests/search/email?email=${encodeURIComponent(userEmail)}`);
                    if (guestResponse.ok) {
                        const guest = await guestResponse.json();
                        guestId = guest.id;
                        document.getElementById('guestFilter').value = guestId;
                    }
                }

                if (!guestId) {
                    setEmptyState('Select a guest to view invoices.', 'Choose a guest from the dropdown above.');
                    return;
                }

                await ensureInvoicesForGuest(guestId);

                // Now fetch invoices for this guest
                const invoicesResponse = await fetch(`${API_BASE}/invoices/guest/${guestId}`);

                if (!invoicesResponse.ok) {
                    throw new Error('Failed to fetch invoices');
                }

                allInvoices = await invoicesResponse.json();
                displayInvoices(allInvoices);
                calculateStats();
            } catch (error) {
                console.error('Error loading invoices:', error);
                setEmptyState('Error loading invoices', 'Please try again later.');
            }
        }

        async function ensureInvoicesForGuest(guestId) {
            try {
                const bookingsResponse = await fetch(`${API_BASE}/bookings/guest/${guestId}`);
                if (!bookingsResponse.ok) {
                    return;
                }
                const bookings = await bookingsResponse.json();
                await Promise.all(bookings.map(booking => {
                    return fetch(`${API_BASE}/invoices/booking/${booking.id}/generate`, { method: 'POST' });
                }));
            } catch (error) {
                console.warn('Invoice generation skipped:', error);
            }
        }

        function displayInvoices(invoices) {
            const container = document.getElementById('invoicesContainer');

            if (invoices.length === 0) {
                container.innerHTML = `
                    <div class="no-invoices">
                        <div class="no-invoices-icon">💳</div>
                        <p>No invoices found</p>
                        <p style="font-size: 0.95em; margin-bottom: 0;">Your invoices will appear here after booking</p>
                    </div>
                `;
                document.getElementById('statsContainer').style.display = 'none';
                return;
            }

            document.getElementById('statsContainer').style.display = 'grid';

            container.innerHTML = invoices.map(invoice => {
                const statusClass = `status-${invoice.status.toLowerCase()}`;
                const formattedDate = new Date(invoice.invoiceDate).toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                });
                const formattedDueDate = invoice.dueDate ? new Date(invoice.dueDate).toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                }) : '-';
                const amount = parseFloat(invoice.totalAmount || invoice.amount || 0).toFixed(2);

                return `
                    <div class="invoice-card">
                        <div class="invoice-header">
                            <div class="invoice-info">
                                <div class="invoice-number">Invoice #${invoice.invoiceNumber || invoice.id}</div>
                                <div class="invoice-date">Issued: ${formattedDate}</div>
                            </div>
                            <div class="invoice-amount">
                                <div class="amount-label">Amount Due</div>
                                <div class="amount-value">$${amount}</div>
                            </div>
                            <div class="invoice-status">
                                <span class="status-badge ${statusClass}">${invoice.status}</span>
                                <div class="due-date">Due: ${formattedDueDate}</div>
                            </div>
                        </div>
                        <div class="invoice-footer">
                            <a href="/guest-invoices/${invoice.id}" class="btn-view">👁️ View Details</a>
                            <a href="/invoices/${invoice.id}/print" class="btn-print" target="_blank">🖨️ Print</a>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterInvoices() {
            const statusFilter = document.getElementById('statusFilter').value;

            let filtered = allInvoices;

            if (statusFilter) {
                filtered = allInvoices.filter(invoice => invoice.status === statusFilter);
            }

            displayInvoices(filtered);
        }

        function calculateStats() {
            if (allInvoices.length === 0) return;

            const totalInvoices = allInvoices.length;
            const paidInvoices = allInvoices.filter(inv => inv.status === 'Paid').length;
            const pendingInvoices = allInvoices.filter(inv => inv.status === 'Pending' || inv.status === 'Unpaid').length;
            const totalAmount = allInvoices.reduce((sum, inv) => sum + parseFloat(inv.totalAmount || inv.amount || 0), 0);

            document.getElementById('totalInvoices').textContent = totalInvoices;
            document.getElementById('paidInvoices').textContent = paidInvoices;
            document.getElementById('pendingInvoices').textContent = pendingInvoices;
            document.getElementById('totalAmount').textContent = '$' + totalAmount.toFixed(2);
        }

        // Load invoices on page load
        window.addEventListener('load', async () => {
            await loadGuestsForFilter();
            await loadInvoices();
        });
    </script>
</body>
</html>
