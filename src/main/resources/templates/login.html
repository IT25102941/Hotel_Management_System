<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hotel Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Roboto', sans-serif;
        }
        .login-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
            padding: 50px 40px;
            animation: slideIn 0.5s ease;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .login-header h1 {
            font-size: 2.5em;
            color: #667eea;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .login-header p {
            color: #999;
            font-size: 0.95em;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
            font-size: 0.95em;
        }
        .form-control {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 0.95em;
            transition: all 0.3s;
        }
        .form-control:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        .alert {
            border-radius: 10px;
            margin-bottom: 20px;
            border: none;
        }
        .links-group {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            font-size: 0.9em;
        }
        .links-group a {
            color: #667eea;
            text-decoration: none;
            transition: color 0.3s;
        }
        .links-group a:hover {
            color: #764ba2;
        }
        .divider {
            text-align: center;
            margin: 30px 0;
            color: #999;
        }
        .register-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }
        .register-link p {
            color: #666;
            font-size: 0.9em;
        }
        .register-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 700;
        }
        .register-link a:hover {
            color: #764ba2;
        }
        .admin-link {
            text-align: center;
            margin-bottom: 20px;
        }
        .admin-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 0.9em;
            font-weight: 600;
        }
        .admin-link a:hover {
            color: #764ba2;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🏨</h1>
            <h1>Hotel Management</h1>
            <p>Guest Login</p>
        </div>

        <div class="admin-link">
            <a href="/auth/admin-login">👨‍💼 Admin Login? Click here</a>
        </div>

        <div th:if="${error}" class="alert alert-danger">
            <strong>⚠️ Error:</strong> <span th:text="${error}"></span>
        </div>

        <form method="POST" action="/auth/login">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="your@email.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <div class="form-check" style="margin-bottom: 20px;">
                <input class="form-check-input" type="checkbox" id="remember" name="remember">
                <label class="form-check-label" for="remember">
                    Remember me
                </label>
            </div>

            <button type="submit" class="btn-login">Login</button>
        </form>

        <div class="divider">OR</div>

        <div class="register-link">
            <p>Don't have an account?</p>
            <a href="/auth/register">Create a New Account</a>
        </div>

        <div class="links-group" style="margin-top: 30px; justify-content: center;">
            <a href="/home">← Back to Home</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Get error from URL parameters or session
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');
        if (error) {
            document.getElementById('errorMessage').textContent = decodeURIComponent(error);
            document.getElementById('errorAlert').style.display = 'block';
        }

        // Form validation
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!email) {
                e.preventDefault();
                document.getElementById('errorMessage').textContent = 'Email is required';
                document.getElementById('errorAlert').style.display = 'block';
                return false;
            }
            if (!password) {
                e.preventDefault();
                document.getElementById('errorMessage').textContent = 'Password is required';
                document.getElementById('errorAlert').style.display = 'block';
                return false;
            }
        });
    </script>
</html>
