<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Registration - Hotel Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            padding: 20px;
        }
        .register-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            padding: 50px 40px;
            animation: slideIn 0.5s ease;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .register-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .register-header h1 {
            font-size: 2.5em;
            color: #667eea;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .register-header p {
            color: #999;
            font-size: 0.95em;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
            font-size: 0.95em;
        }
        .form-control {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 0.95em;
            transition: all 0.3s;
        }
        .form-control:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        .form-text {
            font-size: 0.85em;
            color: #999;
            margin-top: 5px;
        }
        .btn-register {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn-register:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        .alert {
            border-radius: 10px;
            margin-bottom: 20px;
            border: none;
        }
        .login-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }
        .login-link p {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
        }
        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 700;
        }
        .login-link a:hover {
            color: #764ba2;
        }
        .password-strength {
            margin-top: 8px;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
        }
        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s;
        }
        .weak { background: #e74c3c; width: 33%; }
        .medium { background: #f39c12; width: 66%; }
        .strong { background: #27ae60; width: 100%; }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <h1>🏨</h1>
            <h1>Hotel Management</h1>
            <p>Guest Registration</p>
        </div>

        <div id="errorAlert" style="display: none;" class="alert alert-danger">
            <strong>⚠️ Error:</strong> <span id="errorMessage"></span>
        </div>

        <form method="POST" action="/auth/register" id="registerForm">
            <div class="form-group">
                <label for="fullName">Full Name *</label>
                <input type="text" class="form-control" id="fullName" name="fullName" placeholder="John Doe" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="your@email.com" required>
                <div class="form-text">We'll use this to log in and send you booking confirmations</div>
            </div>

            <div class="form-group">
                <label for="phoneNumber">Phone Number</label>
                <input type="tel" class="form-control" id="phoneNumber" name="phoneNumber" placeholder="+1 (555) 000-0000">
            </div>

            <div class="form-group">
                <label for="password">Password *</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="Enter a strong password" required minlength="4">
                <div class="password-strength">
                    <div class="password-strength-bar" id="strengthBar"></div>
                </div>
                <div class="form-text">Minimum 4 characters</div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password *</label>
                <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" placeholder="Re-enter your password" required>
                <div class="form-text" id="passwordMatch" style="color: #999;">Passwords must match</div>
            </div>

            <div class="form-check" style="margin-bottom: 20px;">
                <input class="form-check-input" type="checkbox" id="terms" name="terms" required>
                <label class="form-check-label" for="terms">
                    I agree to the Terms and Conditions
                </label>
            </div>

            <button type="submit" class="btn-register" id="submitBtn">Create Account</button>
        </form>

        <div class="login-link">
            <p>Already have an account?</p>
            <a href="/auth/login">Login here</a>
        </div>

        <div style="text-align: center; margin-top: 20px;">
            <a href="/home" style="color: #667eea; text-decoration: none; font-size: 0.9em;">← Back to Home</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Get error from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');
        if (error) {
            document.getElementById('errorMessage').textContent = decodeURIComponent(error);
            document.getElementById('errorAlert').style.display = 'block';
        }

        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirmPassword');
        const strengthBar = document.getElementById('strengthBar');
        const matchText = document.getElementById('passwordMatch');
        const submitBtn = document.getElementById('submitBtn');

        // Password strength indicator
        passwordInput.addEventListener('input', function() {
            const strength = calculateStrength(this.value);
            if (strength < 4) {
                strengthBar.className = 'password-strength-bar weak';
            } else if (strength < 8) {
                strengthBar.className = 'password-strength-bar medium';
            } else {
                strengthBar.className = 'password-strength-bar strong';
            }
            checkPasswordMatch();
        });

        // Check password match
        confirmInput.addEventListener('input', function() {
            checkPasswordMatch();
        });

        function calculateStrength(password) {
            let strength = 0;
            if (password.length >= 4) strength++;
            if (password.length >= 8) strength++;
            if (/[a-z]/.test(password)) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;
            return strength;
        }

        function checkPasswordMatch() {
            if (confirmInput.value) {
                if (passwordInput.value === confirmInput.value) {
                    matchText.textContent = '✓ Passwords match';
                    matchText.style.color = '#27ae60';
                } else {
                    matchText.textContent = '✗ Passwords do not match';
                    matchText.style.color = '#e74c3c';
                }
            }
        }

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            if (passwordInput.value !== confirmInput.value) {
                e.preventDefault();
                document.getElementById('errorMessage').textContent = 'Passwords do not match!';
                document.getElementById('errorAlert').style.display = 'block';
            }
        });
    </script>
</body>
</html>
