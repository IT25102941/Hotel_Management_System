<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Management - Hotel Management System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.5) 0%, rgba(118, 75, 162, 0.5) 100%), url('/images/hotel.jpg') center/cover no-repeat fixed;
            min-height: 100vh;
            color: #2c3e50;
        }
        nav { background: linear-gradient(135deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.9) 100%); padding: 1.2rem 0; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 2rem; }
        .logo { font-size: 1.8em; font-weight: 700; color: #667eea; text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .nav-links { display: flex; gap: 2rem; list-style: none; }
        .nav-links a { color: white; text-decoration: none; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover { color: #667eea; }
        .container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; }
        .page-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px; border-radius: 15px; margin-bottom: 40px; box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3); }
        .page-header h1 { font-size: 2.5em; margin-bottom: 10px; font-weight: 700; }
        .content-grid { display: grid; grid-template-columns: 350px 1fr; gap: 30px; }
        .form-panel { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); height: fit-content; position: sticky; top: 100px; }
        .form-panel h2 { font-size: 1.5em; margin-bottom: 25px; color: #2c3e50; font-weight: 700; padding-bottom: 15px; border-bottom: 2px solid #f0f0f0; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #2c3e50; font-size: 0.9em; }
        input, select, textarea { width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 0.95em; font-family: inherit; transition: all 0.3s; background: #fafafa; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #667eea; background: white; box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1); }
        textarea { resize: vertical; min-height: 80px; }
        .button-group { display: flex; gap: 10px; margin-top: 25px; }
        button { flex: 1; padding: 12px 20px; border: none; border-radius: 10px; font-size: 0.95em; font-weight: 700; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3); }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4); }
        .btn-secondary { background: #6c757d; color: white; }
        .data-panel { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 2px solid #f0f0f0; }
        .panel-header h2 { font-size: 1.5em; color: #2c3e50; font-weight: 700; }
        .search-box { padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 10px; width: 250px; font-size: 0.95em; }
        .data-table { width: 100%; border-collapse: collapse; margin-top: 20px; border-radius: 10px; overflow: hidden; }
        .data-table th { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 18px 15px; text-align: left; font-weight: 700; color: white; }
        .data-table td { padding: 16px 15px; border-bottom: 1px solid #e9ecef; }
        .data-table tbody tr:hover { background: #f5f7ff; }
        .action-buttons { display: flex; gap: 8px; }
        .btn-edit, .btn-delete { padding: 8px 15px; border: none; border-radius: 8px; font-size: 0.85em; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-edit { background: #667eea; color: white; }
        .btn-edit:hover { background: #764ba2; transform: translateY(-2px); }
        .btn-delete { background: #dc3545; color: white; }
        .btn-delete:hover { background: #c82333; transform: translateY(-2px); }
        .alert { padding: 16px 18px; border-radius: 10px; margin-bottom: 20px; display: none; border-left: 4px solid; font-weight: 500; }
        .alert.success { background: #d4edda; color: #155724; border-color: #28a745; }
        .alert.error { background: #f8d7da; color: #721c24; border-color: #dc3545; }
        .alert.show { display: block; animation: slideIn 0.3s ease; }
        .empty-state { text-align: center; padding: 60px 20px; color: #999; }
        .empty-state-icon { font-size: 4em; margin-bottom: 20px; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        @media (max-width: 1024px) { .content-grid { grid-template-columns: 1fr; } .form-panel { position: relative; top: 0; } }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.85em; font-weight: 600; }
        .status-active { background: #d4edda; color: #155724; }
        .status-inactive { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="/dashboard" class="logo"><span>🏨</span> Hotel Management</a>
            <ul class="nav-links">
                <li><a href="/dashboard">Dashboard</a></li>
                <li><a href="/home">Home</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>⭐ Service Management</h1>
            <p>Manage hotel services and amenities</p>
        </div>

        <div style="background: #e7f3ff; border-left: 4px solid #2196F3; padding: 15px; margin-bottom: 20px; border-radius: 5px;">
            <strong>💡 Tip:</strong> Each service name must be unique. Use different names like "Room Service", "Spa Service", "Transport", etc.
        </div>

        <div id="alert" class="alert"></div>

        <div class="content-grid">
            <div class="form-panel">
                <h2 id="formTitle">Add Service</h2>
                <form id="serviceForm">
                    <div class="form-group">
                        <label>Service Name *</label>
                        <input type="text" id="serviceName" required>
                    </div>

                    <div class="form-group">
                        <label>Category *</label>
                        <select id="category" required>
                            <option value="">Select Category</option>
                            <option value="Room Service">Room Service</option>
                            <option value="Spa">Spa</option>
                            <option value="Restaurant">Restaurant</option>
                            <option value="Transportation">Transportation</option>
                            <option value="Tour">Tour</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="description" placeholder="Service description..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>Price *</label>
                        <input type="number" id="price" step="0.01" required>
                    </div>

                    <div class="form-group">
                        <label>Status *</label>
                        <select id="status" required>
                            <option value="">Select Status</option>
                            <option value="Active">Active</option>
                            <option value="Inactive">Inactive</option>
                        </select>
                    </div>

                    <div class="button-group">
                        <button type="submit" class="btn-primary">Save Service</button>
                        <button type="reset" class="btn-secondary">Clear</button>
                    </div>
                </form>
            </div>

            <div class="data-panel">
                <div class="panel-header">
                    <h2>Services List</h2>
                    <input type="text" class="search-box" id="searchBox" placeholder="Search services...">
                </div>
                <div id="servicesList"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api';
        let editingId = null;

        function showAlert(message, type = 'success') {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert ${type} show`;
            setTimeout(() => alert.classList.remove('show'), 4000);
        }

        async function loadServices() {
            try {
                const response = await fetch(`${API_BASE}/services`);
                const services = await response.json();

                if (services.length === 0) {
                    document.getElementById('servicesList').innerHTML = `<div class="empty-state"><div class="empty-state-icon">⭐</div><p>No services yet!</p></div>`;
                    return;
                }

                document.getElementById('servicesList').innerHTML = `
                    <table class="data-table">
                        <thead>
                            <tr><th>Service</th><th>Category</th><th>Price</th><th>Status</th><th>Actions</th></tr>
                        </thead>
                        <tbody>
                            ${services.map(s => `
                                <tr>
                                    <td>${s.serviceName}</td>
                                    <td>${s.category}</td>
                                    <td>$${parseFloat(s.price).toFixed(2)}</td>
                                    <td><span class="status-badge status-${s.status.toLowerCase()}">${s.status}</span></td>
                                    <td><div class="action-buttons">
                                        <button class="btn-edit" onclick="editService(${s.id})">Edit</button>
                                        <button class="btn-delete" onclick="deleteService(${s.id})">Delete</button>
                                    </div></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                showAlert('Error loading services', 'error');
            }
        }

        document.getElementById('serviceForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const serviceData = {
                serviceName: document.getElementById('serviceName').value,
                category: document.getElementById('category').value,
                description: document.getElementById('description').value,
                price: parseFloat(document.getElementById('price').value),
                status: document.getElementById('status').value
            };

            try {
                let response;
                if (editingId) {
                    response = await fetch(`${API_BASE}/services/${editingId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(serviceData)
                    });
                } else {
                    response = await fetch(`${API_BASE}/services`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(serviceData)
                    });
                }

                if (response.ok) {
                    showAlert(editingId ? 'Service updated!' : 'Service added!');
                    document.getElementById('serviceForm').reset();
                    editingId = null;
                    document.getElementById('formTitle').textContent = 'Add Service';
                    loadServices();
                } else {
                    const errorData = await response.text();
                    let errorMessage = 'Failed to save service';

                    if (errorData.includes('VALIDATION_ERROR')) {
                        try {
                            const json = JSON.parse(errorData);
                            const errors = json.data;
                            errorMessage = 'Validation Error: ' + Object.values(errors).join(', ');
                        } catch (e) {
                            errorMessage = 'Validation Error: Please check your input';
                        }
                    } else {
                        errorMessage = 'Error: ' + (errorData || 'Failed to save service');
                    }

                    showAlert(errorMessage, 'error');
                    console.error('Response status:', response.status);
                    console.error('Response body:', errorData);
                }
            } catch (error) {
                showAlert('Error saving service: ' + error.message, 'error');
                console.error('Fetch error:', error);
            }
        });

        async function editService(id) {
            try {
                const response = await fetch(`${API_BASE}/services/${id}`);
                const service = await response.json();
                document.getElementById('serviceName').value = service.serviceName;
                document.getElementById('category').value = service.category;
                document.getElementById('description').value = service.description || '';
                document.getElementById('price').value = service.price;
                document.getElementById('status').value = service.status;
                editingId = id;
                document.getElementById('formTitle').textContent = 'Edit Service';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (error) {
                showAlert('Error loading service', 'error');
            }
        }

        async function deleteService(id) {
            if (!confirm('Delete this service?')) return;
            try {
                const response = await fetch(`${API_BASE}/services/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    showAlert('Service deleted!');
                    loadServices();
                }
            } catch (error) {
                showAlert('Error deleting service', 'error');
            }
        }

        document.getElementById('searchBox').addEventListener('keyup', () => {
            const searchTerm = document.getElementById('searchBox').value.toLowerCase();
            const rows = document.querySelectorAll('.data-table tbody tr');
            rows.forEach(row => {
                row.style.display = row.textContent.toLowerCase().includes(searchTerm) ? '' : 'none';
            });
        });

        loadServices();
    </script>
</body>
</html>
