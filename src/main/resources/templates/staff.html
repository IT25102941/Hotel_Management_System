<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Management - Hotel Management System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.5) 0%, rgba(118, 75, 162, 0.5) 100%), url('/images/hotel.jpg') center/cover no-repeat fixed;
            min-height: 100vh;
            color: #2c3e50;
        }
        nav { background: linear-gradient(135deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.9) 100%); padding: 1.2rem 0; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 2rem; }
        .logo { font-size: 1.8em; font-weight: 700; color: #667eea; text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .nav-links { display: flex; gap: 2rem; list-style: none; }
        .nav-links a { color: white; text-decoration: none; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover { color: #667eea; }
        .container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; }
        .page-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px; border-radius: 15px; margin-bottom: 40px; box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3); }
        .page-header h1 { font-size: 2.5em; margin-bottom: 10px; font-weight: 700; }
        .content-grid { display: grid; grid-template-columns: 350px 1fr; gap: 30px; }
        .form-panel { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); height: fit-content; position: sticky; top: 100px; }
        .form-panel h2 { font-size: 1.5em; margin-bottom: 25px; color: #2c3e50; font-weight: 700; padding-bottom: 15px; border-bottom: 2px solid #f0f0f0; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #2c3e50; font-size: 0.9em; }
        input, select, textarea { width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 0.95em; font-family: inherit; transition: all 0.3s; background: #fafafa; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #667eea; background: white; box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1); }
        .button-group { display: flex; gap: 10px; margin-top: 25px; }
        button { flex: 1; padding: 12px 20px; border: none; border-radius: 10px; font-size: 0.95em; font-weight: 700; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3); }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4); }
        .btn-secondary { background: #6c757d; color: white; }
        .data-panel { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 2px solid #f0f0f0; }
        .panel-header h2 { font-size: 1.5em; color: #2c3e50; font-weight: 700; }
        .search-box { padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 10px; width: 250px; font-size: 0.95em; }
        .data-table { width: 100%; border-collapse: collapse; margin-top: 20px; border-radius: 10px; overflow: hidden; }
        .data-table th { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 18px 15px; text-align: left; font-weight: 700; color: white; }
        .data-table td { padding: 16px 15px; border-bottom: 1px solid #e9ecef; font-size: 0.9em; }
        .data-table tbody tr:hover { background: #f5f7ff; }
        .action-buttons { display: flex; gap: 8px; }
        .btn-edit, .btn-delete { padding: 8px 15px; border: none; border-radius: 8px; font-size: 0.85em; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-edit { background: #667eea; color: white; }
        .btn-edit:hover { background: #764ba2; transform: translateY(-2px); }
        .btn-delete { background: #dc3545; color: white; }
        .btn-delete:hover { background: #c82333; transform: translateY(-2px); }
        .alert { padding: 16px 18px; border-radius: 10px; margin-bottom: 20px; display: none; border-left: 4px solid; font-weight: 500; }
        .alert.success { background: #d4edda; color: #155724; border-color: #28a745; }
        .alert.error { background: #f8d7da; color: #721c24; border-color: #dc3545; }
        .alert.show { display: block; animation: slideIn 0.3s ease; }
        .empty-state { text-align: center; padding: 60px 20px; color: #999; }
        .empty-state-icon { font-size: 4em; margin-bottom: 20px; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        @media (max-width: 1024px) { .content-grid { grid-template-columns: 1fr; } .form-panel { position: relative; top: 0; } }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="/dashboard" class="logo"><span>🏨</span> Hotel Management</a>
            <ul class="nav-links">
                <li><a href="/dashboard">Dashboard</a></li>
                <li><a href="/home">Home</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>👔 Staff Management</h1>
            <p>Manage employee records and information</p>
        </div>

        <div style="background: #e7f3ff; border-left: 4px solid #2196F3; padding: 15px; margin-bottom: 20px; border-radius: 5px;">
            <strong>💡 Tip:</strong> Each staff member must have a unique email address. Use different emails like staff1@hotel.com, staff2@hotel.com, etc.
        </div>

        <div id="alert" class="alert"></div>

        <div class="content-grid">
            <div class="form-panel">
                <h2 id="formTitle">Add Staff</h2>
                <form id="staffForm">
                    <div class="form-group">
                        <label>First Name *</label>
                        <input type="text" id="firstName" required>
                    </div>

                    <div class="form-group">
                        <label>Last Name *</label>
                        <input type="text" id="lastName" required>
                    </div>

                    <div class="form-group">
                        <label>Position *</label>
                        <input type="text" id="position" placeholder="e.g., Manager, Receptionist" required>
                    </div>

                    <div class="form-group">
                        <label>Department *</label>
                        <select id="department" required>
                            <option value="">Select Dept</option>
                            <option value="Front Desk">Front Desk</option>
                            <option value="Housekeeping">Housekeeping</option>
                            <option value="Food & Beverage">Food & Beverage</option>
                            <option value="Management">Management</option>
                            <option value="Maintenance">Maintenance</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" id="email" required>
                    </div>

                    <div class="form-group">
                        <label>Phone Number *</label>
                        <input type="tel" id="phoneNumber" required>
                    </div>

                    <div class="form-group">
                        <label>Join Date *</label>
                        <input type="date" id="joinDate" required>
                    </div>

                    <div class="form-group">
                        <label>Salary * ($)</label>
                        <input type="number" id="salary" step="0.01" min="0" required>
                    </div>

                    <div class="form-group">
                        <label>Status *</label>
                        <select id="status" required>
                            <option value="">Select Status</option>
                            <option value="Active">Active</option>
                            <option value="Inactive">Inactive</option>
                            <option value="On Leave">On Leave</option>
                            <option value="Terminated">Terminated</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Address</label>
                        <textarea id="address" placeholder="Staff address"></textarea>
                    </div>

                    <div class="form-group">
                        <label>City</label>
                        <input type="text" id="city">
                    </div>

                    <div class="form-group">
                        <label>Country</label>
                        <input type="text" id="country">
                    </div>

                    <div class="form-group">
                        <label>Emergency Contact</label>
                        <input type="text" id="emergencyContact" placeholder="Contact name and phone">
                    </div>

                    <div class="button-group">
                        <button type="submit" class="btn-primary">Save Staff</button>
                        <button type="reset" class="btn-secondary">Clear</button>
                    </div>
                </form>
            </div>

            <div class="data-panel">
                <div class="panel-header">
                    <h2>Staff List</h2>
                    <input type="text" class="search-box" id="searchBox" placeholder="Search staff...">
                </div>
                <div id="staffList"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api';
        let editingId = null;

        function showAlert(message, type = 'success') {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert ${type} show`;
            setTimeout(() => alert.classList.remove('show'), 4000);
        }

        async function loadStaff() {
            try {
                const response = await fetch(`${API_BASE}/staff`);
                const staff = await response.json();

                if (staff.length === 0) {
                    document.getElementById('staffList').innerHTML = `<div class="empty-state"><div class="empty-state-icon">👔</div><p>No staff members yet!</p></div>`;
                    return;
                }

                document.getElementById('staffList').innerHTML = `
                    <table class="data-table">
                        <thead>
                            <tr><th>Name</th><th>Position</th><th>Department</th><th>Email</th><th>Phone</th><th>Actions</th></tr>
                        </thead>
                        <tbody>
                            ${staff.map(s => `
                                <tr>
                                    <td>${s.firstName} ${s.lastName}</td>
                                    <td>${s.position}</td>
                                    <td>${s.department}</td>
                                    <td>${s.email}</td>
                                    <td>${s.phoneNumber}</td>
                                    <td><div class="action-buttons">
                                        <button class="btn-edit" onclick="editStaff(${s.id})">Edit</button>
                                        <button class="btn-delete" onclick="deleteStaff(${s.id})">Delete</button>
                                    </div></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                showAlert('Error loading staff', 'error');
            }
        }

        document.getElementById('staffForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const staffData = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                position: document.getElementById('position').value,
                department: document.getElementById('department').value,
                email: document.getElementById('email').value,
                phoneNumber: document.getElementById('phoneNumber').value,
                joinDate: document.getElementById('joinDate').value,
                salary: parseFloat(document.getElementById('salary').value),
                status: document.getElementById('status').value,
                address: document.getElementById('address').value,
                city: document.getElementById('city').value,
                country: document.getElementById('country').value,
                emergencyContact: document.getElementById('emergencyContact').value
            };

            try {
                let response;
                if (editingId) {
                    response = await fetch(`${API_BASE}/staff/${editingId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(staffData)
                    });
                } else {
                    response = await fetch(`${API_BASE}/staff`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(staffData)
                    });
                }

                if (response.ok) {
                    showAlert(editingId ? 'Staff updated!' : 'Staff added!');
                    document.getElementById('staffForm').reset();
                    editingId = null;
                    document.getElementById('formTitle').textContent = 'Add Staff';
                    loadStaff();
                } else {
                    const errorData = await response.text();
                    let errorMessage = 'Failed to save staff';

                    if (errorData.includes('Duplicate entry') && errorData.includes('email')) {
                        errorMessage = 'Email already exists! Please use a different email.';
                    } else if (errorData.includes('VALIDATION_ERROR')) {
                        try {
                            const json = JSON.parse(errorData);
                            const errors = json.data;
                            errorMessage = 'Validation Error: ' + Object.values(errors).join(', ');
                        } catch (e) {
                            errorMessage = 'Validation Error: Please check your input';
                        }
                    } else {
                        errorMessage = 'Error: ' + (errorData || 'Failed to save staff');
                    }

                    showAlert(errorMessage, 'error');
                    console.error('Response status:', response.status);
                    console.error('Response body:', errorData);
                }
            } catch (error) {
                showAlert('Error saving staff: ' + error.message, 'error');
                console.error('Fetch error:', error);
            }
        });

        async function editStaff(id) {
            try {
                const response = await fetch(`${API_BASE}/staff/${id}`);
                const s = await response.json();
                document.getElementById('firstName').value = s.firstName;
                document.getElementById('lastName').value = s.lastName;
                document.getElementById('position').value = s.position;
                document.getElementById('department').value = s.department;
                document.getElementById('email').value = s.email;
                document.getElementById('phoneNumber').value = s.phoneNumber;
                document.getElementById('joinDate').value = s.joinDate || '';
                document.getElementById('salary').value = s.salary;
                document.getElementById('status').value = s.status;
                document.getElementById('address').value = s.address || '';
                document.getElementById('city').value = s.city || '';
                document.getElementById('country').value = s.country || '';
                document.getElementById('emergencyContact').value = s.emergencyContact || '';
                editingId = id;
                document.getElementById('formTitle').textContent = 'Edit Staff';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (error) {
                showAlert('Error loading staff details', 'error');
            }
        }

        async function deleteStaff(id) {
            if (!confirm('Delete this staff member?')) return;
            try {
                const response = await fetch(`${API_BASE}/staff/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    showAlert('Staff deleted!');
                    loadStaff();
                }
            } catch (error) {
                showAlert('Error deleting staff', 'error');
            }
        }

        document.getElementById('searchBox').addEventListener('keyup', () => {
            const searchTerm = document.getElementById('searchBox').value.toLowerCase();
            const rows = document.querySelectorAll('.data-table tbody tr');
            rows.forEach(row => {
                row.style.display = row.textContent.toLowerCase().includes(searchTerm) ? '' : 'none';
            });
        });

        loadStaff();
    </script>
</body>
</html>
